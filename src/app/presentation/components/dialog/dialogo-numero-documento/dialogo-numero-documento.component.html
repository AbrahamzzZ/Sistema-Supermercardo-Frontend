<h2 mat-dialog-title class="dialog-title">Número de Documento</h2>

<mat-dialog-content class="dialog-content">
  <p class="dialog-text">
    Este es el número de documento generado para la compra:
  </p>

  <div class="numero-container">
    <span class="numero-text">{{ data.numeroDocumento }}</span>

    <button mat-icon-button color="primary" (click)="copiar()" class="copy-btn">
      <mat-icon>content_copy</mat-icon>
    </button>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-stroked-button color="primary" mat-dialog-close>
    Cerrar
  </button>
</mat-dialog-actions>
